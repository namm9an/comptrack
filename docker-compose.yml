services:
  # ── SearXNG ────────────────────────────────────────────────────────────────
  # Dedicated CompTrack instance. No host port exposed — only reachable
  # within comptrack_net. The existing SearXNG on the host (port 8889) remains
  # untouched and is used by other applications.
  searxng:
    image: searxng/searxng:latest
    container_name: comptrack_searxng
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    networks:
      - comptrack_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comptrack_backend
    ports:
      - "127.0.0.1:8081:8081"   # nginx on host proxies here; not exposed publicly
    env_file:
      - .env
    environment:
      # Reach the SearXNG container through the internal Docker network
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      # Bind-mount the existing SQLite data directory so no migration is needed
      - /root/comptrack/app/data:/app/data
    networks:
      - comptrack_net
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: comptrack_frontend
    ports:
      - "127.0.0.1:3001:3001"   # nginx on host proxies here; not exposed publicly
    environment:
      - INTERNAL_API_URL=http://backend:8081
      - NEXT_PUBLIC_APP_NAME=CompTrack
    networks:
      - comptrack_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  comptrack_net:
    driver: bridge
