services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comptrack_backend
    ports:
      - "127.0.0.1:8081:8081"   # nginx on host proxies here; not exposed publicly
    env_file:
      - .env
    environment:
      # SearXNG runs natively on the host at port 8889 (shared with other apps).
      # host.docker.internal resolves to the Docker host gateway on Linux via extra_hosts.
      - SEARXNG_BASE_URL=http://host.docker.internal:8889
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Bind-mount the existing SQLite data directory so no migration is needed
      - /root/comptrack/app/data:/app/data
    networks:
      - comptrack_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: comptrack_frontend
    ports:
      - "127.0.0.1:3001:3001"   # nginx on host proxies here; not exposed publicly
    environment:
      - INTERNAL_API_URL=http://backend:8081
      - NEXT_PUBLIC_APP_NAME=CompTrack
    networks:
      - comptrack_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  comptrack_net:
    driver: bridge
